name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: '3.12'

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --dev
      - name: Verify package imports
        run: |
          uv run python -c "import theswarm"
          uv run python -c "import theswarm_common"
      - name: Run tests with coverage
        run: uv run pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --ignore=tests/e2e -p no:playwright

  e2e-smoke:
    name: E2E smoke walk (required)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --dev
      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium
      - name: Run dashboard route smoke walk
        run: |
          uv run pytest tests/e2e/test_dashboard_e2e.py::TestRouteSmokeWalk \
            -v --tb=short --browser chromium

  deploy:
    needs: [tests, e2e-smoke]
    if: github.event_name == 'push'
    uses: ./.github/workflows/cd.yml
    with:
      action: deploy
    secrets: inherit
