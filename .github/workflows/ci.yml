name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: '3.12'

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --dev
      - name: Verify package imports
        run: |
          uv run python -c "import theswarm"
          uv run python -c "import theswarm_common"
      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  deploy:
    needs: [tests]
    if: github.event_name == 'push'
    uses: ./.github/workflows/cd.yml
    with:
      action: deploy
    secrets: inherit
