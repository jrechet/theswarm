# Codename pool for role assignments.
#
# Every time a role is assigned to a project, the picker draws an unused
# codename from this pool and binds it to (project_id, role). The codename
# becomes the agent's identity across the dashboard, memory, logs, chat.
#
# Guidelines for adding names:
#   - short (3-6 chars) and easy to pronounce across languages
#   - human first name, no last names
#   - culturally diverse; avoid pop-culture references that age badly
#   - avoid names of real teammates / customers
#
# Order matters for the deterministic picker (hash-mod-pool); prefer
# appending at the end rather than inserting in the middle.

