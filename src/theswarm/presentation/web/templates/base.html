<!DOCTYPE html>
<html lang="en" data-theme="dark" data-base="{{ base }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TheSwarm{% endblock %}</title>
  <link rel="stylesheet" href="{{ base }}/static/css/dashboard.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>
  <nav class="topnav">
    <a href="{{ base }}/" class="logo">TheSwarm</a>
    <div class="nav-links">
      <a href="{{ base }}/">Dashboard</a>
      <a href="{{ base }}/projects/">Projects</a>
      <a href="{{ base }}/cycles/">Cycles</a>
      <a href="{{ base }}/reports/">Reports</a>
      <a href="{{ base }}/demos/">Demos</a>
      <a href="{{ base }}/features/">Features</a>
      <a href="{{ base }}/health">Health</a>
    </div>
    <div class="nav-status" id="sse-status">
      <span class="status-dot connecting"></span> Connecting...
    </div>
    <button type="button"
            id="notifications-toggle"
            class="nav-notifications"
            data-state="idle"
            title="Enable browser notifications for new demos"
            hidden>
      <span data-field="icon">🔔</span>
      <span data-field="label">Notify me</span>
    </button>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <div id="demo-toast-host" class="demo-toast-host" aria-live="polite" aria-atomic="false"></div>
  {% include "partials/_demo_toast.html" %}

  <script src="{{ base }}/static/js/sse.js" defer></script>
  <script src="{{ base }}/static/js/notifications.js" defer></script>
</body>
</html>
