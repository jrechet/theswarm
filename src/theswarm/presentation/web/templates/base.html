<!DOCTYPE html>
<html lang="en" data-theme="dark" data-base="{{ base }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TheSwarm{% endblock %}</title>
  <link rel="stylesheet" href="{{ base }}/static/css/dashboard.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>
  <nav class="topnav">
    <a href="{{ base }}/" class="logo">TheSwarm</a>
    <div class="nav-links">
      <a href="{{ base }}/">Dashboard</a>
      <a href="{{ base }}/projects/">Projects</a>
      <a href="{{ base }}/cycles/">Cycles</a>
      <a href="{{ base }}/reports/">Reports</a>
      <a href="{{ base }}/demos/">Demos</a>
      <a href="{{ base }}/features/">Features</a>
      <a href="{{ base }}/health">Health</a>
    </div>
    <div class="nav-status" id="sse-status">
      <span class="status-dot connecting"></span> Connecting...
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ base }}/static/js/sse.js" defer></script>
</body>
</html>
